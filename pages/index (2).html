<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Full-Viewport Background</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #080C16;
    }

    :root {
      /* Fixed 10px edge inset */
      --edge: 10px;

      /* Safe-area support (notches) */
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    .page {
      width: 100vw;
      height: 100vh;
      background: #080C16;
      overflow: hidden;
      box-sizing: border-box;

      padding:
        calc(var(--edge) + var(--safe-top))
        calc(var(--edge) + var(--safe-right))
        calc(var(--edge) + var(--safe-bottom))
        calc(var(--edge) + var(--safe-left));
    }

    .app {
      width: 100%;
      height: 100%;
      background: #0E1522;
      opacity: 1;
      box-sizing: border-box;
      overflow: hidden;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="app"></div>
  </div>
</body>
</html>
