<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Foreground Magic — Designer</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #080C16;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: rgba(255,255,255,0.92);
    }

    :root {
      --edge: 10px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);

      --bg: #080C16;
      --panel: #0E1522;
      --stroke: rgba(255,255,255,0.08);
      --stroke2: rgba(255,255,255,0.12);
      --text-dim: rgba(255,255,255,0.68);

      --btn: rgba(255,255,255,0.06);
      --btn-hover: rgba(255,255,255,0.10);
      --btn-active: rgba(255,255,255,0.14);
    }

    .page {
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      overflow: hidden;
      box-sizing: border-box;
      padding:
        calc(var(--edge) + var(--safe-top))
        calc(var(--edge) + var(--safe-right))
        calc(var(--edge) + var(--safe-bottom))
        calc(var(--edge) + var(--safe-left));
    }

    .app {
      width: 100%;
      height: 100%;
      background: var(--panel);
      box-sizing: border-box;
      overflow: hidden;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* Top toolbar */
    .toolbar {
      min-height: 64px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;                 /* allow wrapping */
      gap: 10px 12px;
      padding: 10px 12px;
      box-sizing: border-box;
      background: linear-gradient(to bottom, rgba(255,255,255,0.04), rgba(255,255,255,0.00));
      border-bottom: 1px solid var(--stroke);
      min-width: 0;
    }

    /* Brand (logo + text) */
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 0 1 auto;
    }

    /* 2x logo size */
    .logo {
      width: 56px;
      height: 56px;
      display: block;
      filter: brightness(0) invert(1);
      opacity: 0.95;
      flex: 0 0 auto;
    }

    /* Keep text fully visible but contained within logo height */
    .brand__text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-height: 56px;               /* never exceed logo height */
      line-height: 1.15;
    }

    .brand__title {
      font-size: 14px;
      font-weight: 750;
      letter-spacing: 0.2px;
      margin: 0;
      white-space: nowrap;            /* ensures visibility if short */
    }

    .brand__sub {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      margin: 0;
      white-space: nowrap;
    }

    /* Actions: left group + right group */
    .toolbar__actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex: 1 1 auto;
      min-width: 0;
    }

    .actions-left,
    .actions-right {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .actions-left { justify-content: flex-start; }
    .actions-right { justify-content: flex-end; }

    /* Buttons */
    .btn {
      appearance: none;
      border: 1px solid var(--stroke);
      background: var(--btn);
      color: rgba(255,255,255,0.9);
      border-radius: 10px;
      padding: 9px 11px;
      font-size: 12px;
      font-weight: 650;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 120ms ease, border-color 120ms ease, transform 80ms ease;
      user-select: none;
      white-space: nowrap;
    }
    .btn:hover { background: var(--btn-hover); border-color: var(--stroke2); }
    .btn:active { background: var(--btn-active); transform: translateY(1px); }

    .btn--primary {
      background: rgba(86, 132, 255, 0.22);
      border-color: rgba(86, 132, 255, 0.35);
    }
    .btn--primary:hover {
      background: rgba(86, 132, 255, 0.30);
      border-color: rgba(86, 132, 255, 0.55);
    }

    .icon { width: 14px; height: 14px; display: inline-block; }
    .icon svg {
      width: 14px;
      height: 14px;
      display: block;
      fill: none;
      stroke: rgba(255,255,255,0.82);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Content area */
    .content {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      padding: 12px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Product info moved into content, left-aligned at top */
    .content-top {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-width: 0;
    }

    .product-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border: 1px solid var(--stroke);
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
      min-width: 0;
      max-width: 100%;
    }

    .product-name {
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }

    .divider {
      width: 1px;
      height: 16px;
      background: var(--stroke);
      flex: 0 0 auto;
    }

    .product-code {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 196, 61, 0.95);
      box-shadow: 0 0 0 3px rgba(255, 196, 61, 0.12);
    }

    /* Main workspace placeholder (no scrollbars) */
    .workspace {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 12px;
    }

    /* Responsive stacking rules requested:
       - If not enough horizontal space:
         left buttons stack vertically on left
         right buttons stack vertically on right
    */
    @media (max-width: 640px) {
      .toolbar__actions {
        flex-basis: 100%;              /* let actions drop to new line */
      }
      .actions-left,
      .actions-right {
        flex-direction: column;         /* stack within each side */
        align-items: stretch;
      }
      .actions-left .btn,
      .actions-right .btn {
        width: 100%;
        justify-content: center;
      }
    }

    /* Tighten a bit further on very small screens */
    @media (max-width: 420px) {
      .product-code { display: none; }
      .brand__title { font-size: 13px; }
      .brand__sub { font-size: 11px; }
      .btn { padding: 9px 10px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="app">

      <!-- TOP TOOLBAR -->
      <div class="toolbar">
        <!-- Brand only -->
        <div class="brand">
          <!-- Use your working logo source here -->
          <img class="logo" src="assets/graphics/logo/FM_logo.svg" alt="Foreground Magic logo" />
          <div class="brand__text">
            <div class="brand__title">Foreground Magic</div>
            <div class="brand__sub">Designer</div>
          </div>
        </div>

        <!-- Actions: left side + right side -->
        <div class="toolbar__actions">
          <div class="actions-left">
            <button class="btn" type="button">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M9 9h6M9 12h6M9 15h6"/></svg>
              </span>
              Inspector
            </button>

            <button class="btn" type="button">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/></svg>
              </span>
              Canvas
            </button>
          </div>

          <div class="actions-right">
            <button class="btn" type="button">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="M8 7l4-4 4 4"/><path d="M4 21h16"/></svg>
              </span>
              Import
            </button>

            <button class="btn btn--primary" type="button">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M12 21V9"/><path d="M16 17l-4 4-4-4"/><path d="M4 3h16"/></svg>
              </span>
              Export
            </button>
          </div>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="content">
        <!-- Product info moved here (top-left) -->
        <div class="content-top">
          <div class="product-pill" aria-label="Product details">
            <div class="product-name">Shirt Type A</div>
            <div class="divider" aria-hidden="true"></div>
            <div class="product-code">SKU: STA-001</div>
            <div class="divider" aria-hidden="true"></div>
            <div class="status"><span class="dot" aria-hidden="true"></span>Unsaved</div>
          </div>
        </div>

        <!-- placeholder workspace -->
        <div class="workspace"></div>
      </div>

    </div>
  </div>
</body>
</html>
