<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Foreground Magic — Designer</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #080C16;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: rgba(255,255,255,0.92);
    }

    :root {
      --edge: 10px;

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);

      --bg: #080C16;
      --panel: #0E1522;
      --bar: rgba(9, 14, 26, 0.55);
      --stroke: rgba(255,255,255,0.08);
      --stroke2: rgba(255,255,255,0.12);
      --text-dim: rgba(255,255,255,0.68);

      --btn: rgba(255,255,255,0.06);
      --btn-hover: rgba(255,255,255,0.10);
      --btn-active: rgba(255,255,255,0.14);

      --primary: rgba(86, 132, 255, 0.95);
      --primary-hover: rgba(86, 132, 255, 1);
    }

    .page {
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      overflow: hidden;
      box-sizing: border-box;
      padding:
        calc(var(--edge) + var(--safe-top))
        calc(var(--edge) + var(--safe-right))
        calc(var(--edge) + var(--safe-bottom))
        calc(var(--edge) + var(--safe-left));
    }

    .app {
      width: 100%;
      height: 100%;
      background: var(--panel);
      opacity: 1;
      box-sizing: border-box;
      overflow: hidden;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      min-height: 0; /* important for flex overflow behavior */
    }

    /* Top toolbar */
    .toolbar {
      height: 52px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      box-sizing: border-box;
      background: linear-gradient(to bottom, rgba(255,255,255,0.04), rgba(255,255,255,0.00));
      border-bottom: 1px solid var(--stroke);
      gap: 12px;
      min-width: 0;
    }

    .toolbar__left,
    .toolbar__center,
    .toolbar__right {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .toolbar__left { flex: 1 1 0; }
    .toolbar__center { flex: 0 0 auto; justify-content: center; }
    .toolbar__right { flex: 1 1 0; justify-content: flex-end; }

    /* Brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo {
      width: 28px;
      height: 28px;
      display: block;
      /* Force a white look on dark bg (works well for mono SVGs) */
      filter: brightness(0) invert(1);
      opacity: 0.95;
    }

    .brand__text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
      min-width: 0;
    }

    .brand__title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand__sub {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Center product info */
    .product-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      border: 1px solid var(--stroke);
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
      max-width: min(560px, 70vw);
      min-width: 0;
    }

    .product-name {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .divider {
      width: 1px;
      height: 16px;
      background: var(--stroke);
    }

    .product-code {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 196, 61, 0.95);
      box-shadow: 0 0 0 3px rgba(255, 196, 61, 0.12);
    }

    /* Buttons */
    .btn {
      appearance: none;
      border: 1px solid var(--stroke);
      background: var(--btn);
      color: rgba(255,255,255,0.9);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 120ms ease, border-color 120ms ease, transform 80ms ease;
      user-select: none;
      white-space: nowrap;
    }

    .btn:hover { background: var(--btn-hover); border-color: var(--stroke2); }
    .btn:active { background: var(--btn-active); transform: translateY(1px); }

    .btn--icon {
      width: 36px;
      justify-content: center;
      padding: 8px 0;
    }

    .btn--primary {
      background: rgba(86, 132, 255, 0.22);
      border-color: rgba(86, 132, 255, 0.35);
    }
    .btn--primary:hover {
      background: rgba(86, 132, 255, 0.30);
      border-color: rgba(86, 132, 255, 0.55);
    }

    .btn-group { display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; }

    /* Simple inline icons */
    .icon {
      width: 14px;
      height: 14px;
      display: inline-block;
    }
    .icon svg {
      width: 14px;
      height: 14px;
      display: block;
      fill: none;
      stroke: rgba(255,255,255,0.82);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Main content placeholder */
    .content {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      padding: 12px;
      box-sizing: border-box;
    }

    /* Mobile tightening */
    @media (max-width: 520px) {
      .brand__sub { display: none; }
      .product-code { display: none; }
      .toolbar { padding: 10px; }
      .btn { padding: 8px 9px; }
      .btn--icon { width: 34px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="app">
      <div class="toolbar">
        <!-- Left: logo + product name -->
        <div class="toolbar__left">
          <div class="brand">
            <img class="logo" src="assets/graphics/logo/FM_logo.svg" alt="Foreground Magic logo" />
            <div class="brand__text">
              <div class="brand__title">Foreground Magic</div>
              <div class="brand__sub">Designer</div>
            </div>
          </div>
        </div>

        <!-- Center: product + sku + status -->
        <div class="toolbar__center">
          <div class="product-pill" aria-label="Product details">
            <div class="product-name">Shirt Type A</div>
            <div class="divider" aria-hidden="true"></div>
            <div class="product-code">SKU: STA-001</div>
            <div class="divider" aria-hidden="true"></div>
            <div class="status"><span class="dot" aria-hidden="true"></span>Unsaved</div>
          </div>
        </div>

        <!-- Right: buttons -->
        <div class="toolbar__right">
          <div class="btn-group">
            <button class="btn btn--icon" type="button" title="Undo" aria-label="Undo">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M9 14l-4-4 4-4"/><path d="M5 10h10a6 6 0 1 1 0 12h-3"/></svg>
              </span>
            </button>

            <button class="btn btn--icon" type="button" title="Redo" aria-label="Redo">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M15 14l4-4-4-4"/><path d="M19 10H9a6 6 0 1 0 0 12h3"/></svg>
              </span>
            </button>

            <button class="btn" type="button">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M9 9h6M9 12h6M9 15h6"/></svg>
              </span>
              Inspector
            </button>

            <button class="btn" type="button">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/></svg>
              </span>
              Canvas
            </button>

            <button class="btn" type="button">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="M8 7l4-4 4 4"/><path d="M4 21h16"/></svg>
              </span>
              Import Design
            </button>

            <button class="btn btn--primary" type="button">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M12 21V9"/><path d="M16 17l-4 4-4-4"/><path d="M4 3h16"/></svg>
              </span>
              Export Design
            </button>
          </div>
        </div>
      </div>

      <!-- Placeholder for future app layout -->
      <div class="content"></div>
    </div>
  </div>
</body>
</html>
