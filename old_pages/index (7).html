<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Foreground Magic — Designer</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #080C16;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: rgba(255,255,255,0.92);
    }

    :root{
      --edge: 10px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);

      --bg: #080C16;
      --panel: #0E1522;

      --stroke: rgba(255,255,255,0.08);
      --stroke2: rgba(255,255,255,0.12);
      --text-dim: rgba(255,255,255,0.68);

      --btn: rgba(255,255,255,0.06);
      --btn-hover: rgba(255,255,255,0.10);
      --btn-active: rgba(255,255,255,0.14);
    }

    .page{
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      overflow: hidden;
      box-sizing: border-box;
      padding:
        calc(var(--edge) + var(--safe-top))
        calc(var(--edge) + var(--safe-right))
        calc(var(--edge) + var(--safe-bottom))
        calc(var(--edge) + var(--safe-left));
    }

    .app{
      width: 100%;
      height: 100%;
      background: var(--panel);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* ===== Top Info Bar: EXACT 50/50 ===== */
    .topbar{
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;       /* 50/50 */
      column-gap: 10px;                    /* small gap between halves */
      align-items: center;
      padding: 8px 10px;                   /* reduced vertical space */
      background: linear-gradient(to bottom, rgba(255,255,255,0.04), rgba(255,255,255,0.00));
      border-bottom: 1px solid var(--stroke);
      min-width: 0;
    }

    .brand{
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      overflow: hidden;
    }

    /* bigger logo */
    .logo{
      width: 56px;
      height: 56px;
      display: block;
      filter: brightness(0) invert(1);
      opacity: 0.95;
      flex: 0 0 auto;
    }

    /* text always visible, never taller than logo */
    .brand__text{
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-height: 56px;
      line-height: 1.12;
      min-width: 0;
      overflow: hidden;
    }
    .brand__title{
      font-size: 14px;
      font-weight: 750;
      letter-spacing: 0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin: 0;
    }
    .brand__sub{
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin: 0;
    }

    /* Right half: code/status container fills its 50% */
    .shareWrap{
      min-width: 0;
      display: flex;
      justify-content: flex-end;
    }

    /* Code + status pill (no "CODE" label) */
    .share-pill{
      width: 100%;
      max-width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 10px;                   /* reduced height */
      border: 1px solid var(--stroke);
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
      min-width: 0;
    }

    .share-code{
      min-width: 0;
      font-size: 12px;
      font-weight: 750;
      letter-spacing: 1.0px;
      color: rgba(255,255,255,0.92);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status{
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .dot{
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 196, 61, 0.95);
      box-shadow: 0 0 0 3px rgba(255, 196, 61, 0.12);
    }

    /* If right side gets tight: stack code on top, status below */
    @media (max-width: 420px){
      .share-pill{
        flex-direction: column;
        align-items: flex-end;             /* right aligned */
        gap: 4px;
        padding: 7px 10px;
      }
      .share-code, .status{
        width: 100%;
        text-align: right;
      }
    }

    /* ===== Buttons toolbar: 4 buttons in one row, compact ===== */
    .btnbar{
      flex: 0 0 auto;
      padding: 8px 10px;                  /* reduced height */
      border-bottom: 1px solid var(--stroke);
      background: rgba(255,255,255,0.02);
    }

    /* One row, 4 equal buttons, with a "medium gap" in the middle */
    .btngrid{
      display: grid;
      grid-template-columns: 1fr 1fr 24px 1fr 1fr;  /* middle spacer column */
      align-items: stretch;
      gap: 8px;
    }

    .midGap{ width: 24px; }

    /* Buttons: no wrapping, font auto-adjust via clamp, icon stays */
    .btn{
      appearance: none;
      border: 1px solid var(--stroke);
      background: var(--btn);
      color: rgba(255,255,255,0.9);
      border-radius: 12px;
      padding: 10px 10px;                 /* compact */
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;

      /* key: prevent new lines and reduce font if needed */
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 700;
      font-size: clamp(10px, 2.7vw, 12px); /* scales down on mobile */
      line-height: 1;
      min-width: 0;
      transition: background 120ms ease, border-color 120ms ease, transform 80ms ease;
      user-select: none;
    }
    .btn:hover{ background: var(--btn-hover); border-color: var(--stroke2); }
    .btn:active{ background: var(--btn-active); transform: translateY(1px); }

    .btn--primary{
      background: rgba(86, 132, 255, 0.22);
      border-color: rgba(86, 132, 255, 0.35);
    }
    .btn--primary:hover{
      background: rgba(86, 132, 255, 0.30);
      border-color: rgba(86, 132, 255, 0.55);
    }

    .icon{ width: 14px; height: 14px; flex: 0 0 auto; display: inline-block; }
    .icon svg{
      width: 14px; height: 14px;
      display: block;
      fill: none;
      stroke: rgba(255,255,255,0.82);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* If extremely narrow, keep ONE ROW and just shrink text/icon slightly */
    @media (max-width: 340px){
      .btn{ gap: 6px; padding: 9px 8px; }
      .icon{ width: 13px; height: 13px; }
      .icon svg{ width: 13px; height: 13px; }
      .btngrid{ grid-template-columns: 1fr 1fr 18px 1fr 1fr; }
    }

    /* ===== Content ===== */
    .content{
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      padding: 10px;                       /* slightly reduced */
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .content-top{
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-width: 0;
    }

    .product-pill{
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border: 1px solid var(--stroke);
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
      min-width: 0;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
    }
    .product-name{
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .divider{
      width: 1px;
      height: 16px;
      background: var(--stroke);
      flex: 0 0 auto;
    }
    .product-code{
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .workspace{
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="app">

      <!-- TOP INFO BAR (50/50) -->
      <div class="topbar">
        <div class="brand">
          <img class="logo" src="assets/graphics/logo/FM_logo.svg" alt="Foreground Magic logo" />
          <div class="brand__text">
            <div class="brand__title">Foreground Magic</div>
            <div class="brand__sub">Designer</div>
          </div>
        </div>

        <div class="shareWrap">
          <div class="share-pill" aria-label="Share code and save status">
            <div class="share-code" id="shareCode">--------</div>
            <div class="status"><span class="dot" aria-hidden="true"></span><span id="saveStatus">Unsaved</span></div>
          </div>
        </div>
      </div>

      <!-- BUTTON TOOLBAR (4 buttons in one row) -->
      <div class="btnbar">
        <div class="btngrid">
          <button class="btn" type="button" title="Inspector">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M9 9h6M9 12h6M9 15h6"/></svg>
            </span>
            Inspector
          </button>

          <button class="btn" type="button" title="Canvas">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/></svg>
            </span>
            Canvas
          </button>

          <div class="midGap" aria-hidden="true"></div>

          <button class="btn" type="button" title="Import">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="M8 7l4-4 4 4"/><path d="M4 21h16"/></svg>
            </span>
            Import
          </button>

          <button class="btn btn--primary" type="button" title="Export">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 21V9"/><path d="M16 17l-4 4-4-4"/><path d="M4 3h16"/></svg>
            </span>
            Export
          </button>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="content">
        <div class="content-top">
          <div class="product-pill" aria-label="Product details">
            <div class="product-name">Shirt Type A</div>
            <div class="divider" aria-hidden="true"></div>
            <div class="product-code">SKU: STA-001</div>
          </div>
        </div>
        <div class="workspace"></div>
      </div>

    </div>
  </div>

  <script>
    // Mockup 8-char A-Z0-9 code
    function genCode(len = 8) {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let out = "";
      for (let i = 0; i < len; i++) out += chars[Math.floor(Math.random() * chars.length)];
      return out;
    }
    document.getElementById("shareCode").textContent = genCode(8);
  </script>
</body>
</html>
