<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Full-Viewport Background</title>
  <style>
    /* Ensure the document never exceeds the viewport and never scrolls */
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden; /* prevents scrollbars */
      background: #080C16;
    }

    /* Optional wrapper if you want to place content later */
    .page {
      width: 100vw;
      height: 100vh;
      background: #080C16;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="page"></div>
</body>
</html>
